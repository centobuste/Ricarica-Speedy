<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CISSP Formulas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Variables ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f4f0;
    --bg2:       #eceae3;
    --bg3:       #e2dfd6;
    --surface:   #ffffff;
    --border:    #d4d0c8;
    --text:      #1a1916;
    --text2:     #5c5a54;
    --text3:     #908e88;
    --accent:    #2d4af5;
    --accent2:   #1a30c4;
    --accent-bg: #eef0fd;
    --green:     #1a7a4a;
    --green-bg:  #e8f5ee;
    --red:       #c23b2e;
    --red-bg:    #fdecea;
    --formula-bg:#f0f4ff;
    --formula-border: #c0ccf8;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 2px 8px rgba(0,0,0,.10), 0 8px 32px rgba(0,0,0,.08);
    --radius:    12px;
    --radius-sm: 8px;
    --sidebar-w: 260px;
    --font-mono: 'Space Mono', monospace;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --transition: .18s cubic-bezier(.4,0,.2,1);
  }

  [data-theme="dark"] {
    --bg:        #111210;
    --bg2:       #191917;
    --bg3:       #222220;
    --surface:   #1e1e1c;
    --border:    #2e2e2b;
    --text:      #f0ede8;
    --text2:     #a8a49e;
    --text3:     #68665f;
    --accent:    #6b85ff;
    --accent2:   #8fa0ff;
    --accent-bg: #1a1f3a;
    --green:     #4eca7e;
    --green-bg:  #0f2a1c;
    --red:       #f07268;
    --red-bg:    #2a100e;
    --formula-bg:#161b30;
    --formula-border: #2a3366;
    --shadow:    0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
    --shadow-lg: 0 2px 8px rgba(0,0,0,.4), 0 8px 32px rgba(0,0,0,.3);
  }

  /* ── Base ─────────────────────────────────────────────────── */
  html { font-size: 15px; scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
  }

  /* ── Layout ───────────────────────────────────────────────── */
  .app { display: flex; min-height: 100vh; }

  /* ── Sidebar ──────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: background var(--transition), border-color var(--transition), transform var(--transition);
  }
  .sidebar-header {
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.25rem;
    letter-spacing: -.02em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: .6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: .06em;
  }
  .logo-sub {
    font-size: .72rem;
    color: var(--text3);
    font-family: var(--font-body);
    font-weight: 400;
  }
  .sidebar-nav { flex: 1; padding: 12px 0; }
  .nav-section { margin-bottom: 4px; }
  .nav-domain-btn {
    width: 100%;
    text-align: left;
    padding: 8px 18px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .72rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color var(--transition);
  }
  .nav-domain-btn:hover { color: var(--accent); }
  .nav-domain-btn.active { color: var(--accent); }
  .nav-domain-chevron { transition: transform var(--transition); font-size: .8rem; }
  .nav-domain-btn.open .nav-domain-chevron { transform: rotate(90deg); }
  .nav-formulas { display: none; }
  .nav-formulas.open { display: block; }
  .nav-formula-btn {
    width: 100%;
    text-align: left;
    padding: 7px 18px 7px 28px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: .82rem;
    color: var(--text2);
    transition: color var(--transition), background var(--transition);
    border-left: 2px solid transparent;
    margin-left: 0;
  }
  .nav-formula-btn:hover { color: var(--text); background: var(--bg3); }
  .nav-formula-btn.active {
    color: var(--accent);
    background: var(--accent-bg);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .sidebar-footer {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .show-all-btn {
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid var(--formula-border);
    border-radius: var(--radius-sm);
    padding: 7px 12px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: .8rem;
    font-weight: 500;
    transition: background var(--transition), color var(--transition);
  }
  .show-all-btn:hover { background: var(--accent); color: #fff; }
  .controls-row { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 11px;
    cursor: pointer;
    font-size: .9rem;
    color: var(--text2);
    transition: background var(--transition), color var(--transition);
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-body);
    font-size: .78rem;
    font-weight: 500;
    flex: 1;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--accent-bg); color: var(--accent); }
  .icon-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Main content ─────────────────────────────────────────── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    transition: background var(--transition), border-color var(--transition);
  }
  .hamburger {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-size: 1.2rem;
  }
  .breadcrumb {
    font-size: .78rem;
    color: var(--text3);
    flex: 1;
  }
  .breadcrumb span { color: var(--text2); }
  .content { padding: 32px; max-width: 900px; }

  /* ── Formula Card ─────────────────────────────────────────── */
  .formula-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
    transition: background var(--transition), border-color var(--transition);
    animation: fadeUp .25s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .formula-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 16px;
  }
  .formula-titles { flex: 1; }
  .formula-name-it {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: -.03em;
    color: var(--text);
    line-height: 1.2;
  }
  .formula-name-en {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: .9rem;
    color: var(--text3);
    margin-top: 2px;
  }
  .formula-domain-tag {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    background: var(--accent-bg);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Formula display */
  .formula-box {
    background: var(--formula-bg);
    border: 1px solid var(--formula-border);
    border-radius: var(--radius-sm);
    padding: 18px 24px;
    margin: 16px 0;
    text-align: center;
  }
  .formula-text {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -.01em;
  }
  .formula-alt {
    font-family: var(--font-mono);
    font-size: .82rem;
    color: var(--text3);
    margin-top: 6px;
  }

  /* Descriptions */
  .desc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 14px 0;
  }
  .desc-block {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    border: 1px solid var(--border);
  }
  .desc-lang {
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .desc-text { font-size: .85rem; color: var(--text2); line-height: 1.5; }

  /* Variables */
  .vars-section { margin: 14px 0; }
  .section-label {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text3);
    margin-bottom: 8px;
  }
  .vars-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .var-chip {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-size: .8rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .var-chip-name {
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--accent);
    font-size: .78rem;
  }
  .var-chip-desc { color: var(--text2); }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* Calculator */
  .calc-section { }
  .calc-label {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calc-icon { font-size: 1rem; }
  .calc-inputs { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
  .calc-field { display: flex; flex-direction: column; gap: 5px; min-width: 140px; flex: 1; }
  .calc-field label {
    font-size: .75rem;
    font-weight: 600;
    color: var(--text2);
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .calc-field label span {
    font-family: var(--font-mono);
    font-size: .78rem;
    color: var(--accent);
    font-weight: 700;
  }
  .calc-input-wrap { position: relative; display: flex; align-items: center; }
  .calc-input {
    width: 100%;
    padding: 9px 12px;
    padding-right: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: .88rem;
    color: var(--text);
    transition: border-color var(--transition), background var(--transition);
    outline: none;
    -moz-appearance: textfield;
  }
  .calc-input::-webkit-inner-spin-button,
  .calc-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .calc-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,74,245,.12); }
  .calc-input.error { border-color: var(--red); }
  .calc-unit {
    position: absolute;
    right: 10px;
    font-size: .7rem;
    color: var(--text3);
    font-family: var(--font-body);
    font-weight: 500;
    pointer-events: none;
  }
  .calc-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 22px;
    cursor: pointer;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: .88rem;
    letter-spacing: .02em;
    transition: background var(--transition), transform .1s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    align-self: flex-end;
  }
  .calc-btn:hover { background: var(--accent2); }
  .calc-btn:active { transform: scale(.97); }
  .calc-error {
    font-size: .78rem;
    color: var(--red);
    background: var(--red-bg);
    border: 1px solid var(--red);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-top: 8px;
    display: none;
  }
  .calc-error.show { display: block; }
  .calc-result {
    background: var(--green-bg);
    border: 1px solid var(--green);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    margin-top: 14px;
    display: none;
    animation: fadeUp .2s ease both;
  }
  .calc-result.show { display: block; }
  .result-value {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--green);
    letter-spacing: -.02em;
    margin-bottom: 4px;
  }
  .result-note { font-size: .8rem; color: var(--text2); }

  /* All formulas overview */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    cursor: pointer;
    transition: box-shadow var(--transition), border-color var(--transition), transform var(--transition);
    box-shadow: var(--shadow);
    animation: fadeUp .2s ease both;
  }
  .overview-card:nth-child(2) { animation-delay: .04s; }
  .overview-card:nth-child(3) { animation-delay: .08s; }
  .overview-card:nth-child(4) { animation-delay: .12s; }
  .overview-card:nth-child(5) { animation-delay: .16s; }
  .overview-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .ov-domain { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text3); margin-bottom: 6px; }
  .ov-name { font-family: var(--font-head); font-weight: 800; font-size: 1.05rem; color: var(--text); margin-bottom: 6px; letter-spacing: -.02em; }
  .ov-formula { font-family: var(--font-mono); font-size: .82rem; color: var(--accent); background: var(--formula-bg); border: 1px solid var(--formula-border); border-radius: 6px; padding: 5px 10px; display: inline-block; margin-bottom: 10px; }
  .ov-desc { font-size: .78rem; color: var(--text2); line-height: 1.45; }
  .ov-arrow { color: var(--accent); font-size: .9rem; margin-top: 12px; font-weight: 700; }

  /* Page header */
  .page-header {
    margin-bottom: 28px;
    animation: fadeUp .2s ease both;
  }
  .page-title {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -.04em;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .page-sub { font-size: .9rem; color: var(--text2); max-width: 600px; }
  .domain-header {
    margin-bottom: 22px;
    animation: fadeUp .2s ease both;
  }
  .domain-title {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -.03em;
    color: var(--text);
    margin-bottom: 4px;
  }
  .domain-count { font-size: .82rem; color: var(--text3); }

  /* Mobile overlay */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 99;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .content { padding: 20px 16px; }
    .topbar { padding: 12px 16px; }
    .desc-grid { grid-template-columns: 1fr; }
    .overview-grid { grid-template-columns: 1fr; }
    .formula-card { padding: 20px 18px; }
    .page-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span>CISSP</span>
        <span class="logo-badge">CALC</span>
      </div>
      <div class="logo-sub" id="logo-sub">Formule per l'esame CISSP</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- built by JS -->
    </nav>
    <div class="sidebar-footer">
      <button class="show-all-btn" id="showAllBtn" onclick="showAll()">📋 <span id="showAllLabel">Tutte le formule</span></button>
      <div class="controls-row">
        <button class="icon-btn" id="themeBtn" onclick="toggleTheme()">🌙 <span id="themeLabel">Scuro</span></button>
        <button class="icon-btn" id="langBtn" onclick="toggleLang()">🌐 <span id="langLabel">English</span></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="openSidebar()">☰</button>
      <div class="breadcrumb" id="breadcrumb">
        CISSP Formulas / <span id="breadcrumbSub">Home</span>
      </div>
    </div>
    <div class="content" id="mainContent">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════════
const FORMULAS = [
  {
    id: "sle",
    domain: "Risk",
    domain_it: "Security & Risk Management",
    domain_en: "Security & Risk Management",
    name_it: "SLE – Single Loss Expectancy",
    name_en: "SLE – Single Loss Expectancy",
    formula: "SLE = AV × EF",
    formula_alt: null,
    desc_it: "Calcola il danno economico medio causato da un singolo evento di rischio su un asset.",
    desc_en: "Calculates the average monetary loss from a single occurrence of a risk event on an asset.",
    vars: {
      AV: { it: "Asset Value – Valore economico dell'asset", en: "Asset Value – Economic value of the asset", unit: "€" },
      EF: { it: "Exposure Factor – Percentuale di danno (0–1)", en: "Exposure Factor – Percentage of damage (0–1)", unit: "%" }
    },
    calc: (inputs) => {
      const av = parseFloat(inputs.AV);
      const ef = parseFloat(inputs.EF);
      if (isNaN(av) || isNaN(ef)) return null;
      if (av <= 0) return { error_it: "AV deve essere > 0", error_en: "AV must be > 0" };
      if (ef < 0 || ef > 1) return { error_it: "EF deve essere tra 0 e 1 (es. 0.4 per 40%)", error_en: "EF must be between 0 and 1 (e.g. 0.4 for 40%)" };
      const val = av * ef;
      return {
        value: val,
        label: "SLE",
        unit: "€",
        note_it: `Un singolo evento costa mediamente €${fmt(val)}`,
        note_en: `A single event costs on average €${fmt(val)}`
      };
    }
  },
  {
    id: "ale",
    domain: "Risk",
    domain_it: "Security & Risk Management",
    domain_en: "Security & Risk Management",
    name_it: "ALE – Annual Loss Expectancy",
    name_en: "ALE – Annual Loss Expectancy",
    formula: "ALE = SLE × ARO",
    formula_alt: "ALE = AV × EF × ARO",
    desc_it: "Calcola il danno annuo atteso moltiplicando la perdita singola per la frequenza annuale del rischio.",
    desc_en: "Calculates the expected annual loss by multiplying the single-event loss by its annual frequency.",
    vars: {
      SLE: { it: "Single Loss Expectancy – Danno per singolo evento", en: "Single Loss Expectancy – Loss per single event", unit: "€" },
      ARO: { it: "Annual Rate of Occurrence – Frequenza annuale", en: "Annual Rate of Occurrence – Annual frequency", unit: "×/yr" }
    },
    calc: (inputs) => {
      const sle = parseFloat(inputs.SLE);
      const aro = parseFloat(inputs.ARO);
      if (isNaN(sle) || isNaN(aro)) return null;
      if (sle <= 0) return { error_it: "SLE deve essere > 0", error_en: "SLE must be > 0" };
      if (aro < 0) return { error_it: "ARO deve essere ≥ 0", error_en: "ARO must be ≥ 0" };
      const val = sle * aro;
      return {
        value: val,
        label: "ALE",
        unit: "€/anno",
        note_it: `Il rischio costa mediamente €${fmt(val)} all'anno`,

    vars: {

          ? `Tra ripristino (${rto}h) e perdita dati (${rpo}h) c'è un gap di ${fmt(val)}h`
          : `RPO > RTO: attenzione, la finestra di recupero è negativa di ${fmt(Math.abs(val))}h`,
        note_en: val >= 0
          ? `Between recovery (${rto}h) and data loss (${rpo}h) there's a ${fmt(val)}h gap`
          : `RPO > RTO: warning, the recovery window is negative by ${fmt(Math.abs(val))}h`
      };
    }
  }

// ── Helper functions ────────────────────────────────────────────
function fmt(n) {
  if (Number.isInteger(n)) return n.toLocaleString('it-IT');
  return parseFloat(n.toFixed(4)).toLocaleString('it-IT', { maximumFractionDigits: 4 });
}
function countNines(a) {
  if (a >= 0.99999) return "Five 9s (99.999%)";
  if (a >= 0.9999)  return "Four 9s (99.99%)";
  if (a >= 0.999)   return "Three 9s (99.9%)";
  if (a >= 0.99)    return "Two 9s (99%)";
  return "< 99%";
}
function downtime(a) {
  const hours = (1 - a) * 8760;
  if (hours < 1)   return `${(hours * 60).toFixed(0)} min`;
  if (hours < 24)  return `${hours.toFixed(1)} h`;
  return `${(hours / 24).toFixed(1)} gg`;
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);

  const lbl = document.getElementById('themeLabel');
  if (theme === 'dark') {
    btn.textContent = ''; btn.innerHTML = '☀️ <span id="themeLabel"></span>';

  } else {

    document.getElementById('themeLabel').textContent = lang === 'it' ? 'Scuro' : 'Dark';
  }

  theme = theme === 'dark' ? 'light' : 'dark';

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  DOMAIN_ORDER.forEach(domKey => {
    const formulas = FORMULAS.filter(f => f.domain === domKey);
    const meta = DOMAIN_META[domKey];
    const section = document.createElement('div');
    section.className = 'nav-section';
    const isOpen = openDomains[domKey];
    section.innerHTML = `
      <button class="nav-domain-btn ${isOpen ? 'open' : ''}" onclick="toggleDomain('${domKey}')">
        <span>${meta.icon} ${lang === 'it' ? meta.it : meta.en}</span>
        <span class="nav-domain-chevron">›</span>
      </button>
      <div class="nav-formulas ${isOpen ? 'open' : ''}" id="domain-${domKey}">
        ${formulas.map(f => `
          <button class="nav-formula-btn ${activeView === f.id ? 'active' : ''}"
            onclick="showFormula('${f.id}')">
            ${lang === 'it' ? f.name_it : f.name_en}
          </button>
        `).join('')}
      </div>
    `;
    nav.appendChild(section);
  });
}
function toggleDomain(domKey) {

  main.innerHTML = renderFormulaPage(f);
  initCalc(f);
}

function initCalc(f) {
  // Allow Enter key to trigger calc
  const inputs = document.querySelectorAll(`[data-var]`);
  inputs.forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') doCalc(f.id);
    });
  });
}

function doCalc(id) {
  const f = FORMULAS.find(x => x.id === id);
  if (!f) return;

  const inputs = {};
  let allFilled = true;
  Object.keys(f.vars).forEach(k => {
    const el = document.getElementById(`inp-${id}-${k}`);
    inputs[k] = el ? el.value : '';
    if (!el || el.value === '') allFilled = false;
    if (el) el.classList.remove('error');
  });

  const errEl = document.getElementById(`err-${id}`);
  const resEl = document.getElementById(`res-${id}`);

  if (!allFilled) {
    errEl.textContent = t('errorGeneric');
    errEl.classList.add('show');
    resEl.classList.remove('show');
    Object.keys(f.vars).forEach(k => {
      const el = document.getElementById(`inp-${id}-${k}`);
      if (el && el.value === '') el.classList.add('error');
    });
    return;
  }

  const result = f.calc(inputs);
  if (!result) {
    errEl.textContent = t('errorGeneric');
    errEl.classList.add('show');
    resEl.classList.remove('show');
    return;
  }
  if (result.error_it) {
    errEl.textContent = lang === 'it' ? result.error_it : result.error_en;
    errEl.classList.add('show');
    resEl.classList.remove('show');
    return;
  }

  errEl.classList.remove('show');
  resEl.classList.add('show');
  const valStr = result.unit
    ? `${result.label} = ${fmt(result.value)} ${result.unit}`
    : `${result.label} = ${fmt(result.value)}`;
  document.getElementById(`resval-${id}`).textContent = valStr;
  document.getElementById(`resnote-${id}`).textContent = lang === 'it' ? result.note_it : result.note_en;
}
