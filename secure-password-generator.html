<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Password Generator</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --text: #161b22;
      --muted: #5d6778;
      --border: #d7dde7;
      --primary: #0f766e;
      --primary-2: #115e59;
      --success: #166534;
      --warning: #b45309;
      --danger: #b91c1c;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --radius-sm: 12px;
    }
    [data-theme="dark"] {
      --bg: #0b1220;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #e5edf7;
      --muted: #9aa7bb;
      --border: #334155;
      --primary: #2dd4bf;
      --primary-2: #14b8a6;
      --success: #4ade80;
      --warning: #f59e0b;
      --danger: #f87171;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 82%, var(--surface) 18%));
      color: var(--text);
      min-height: 100vh;
    }
    .app {
      max-width: 1024px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar, .card, .result-box, .footer-note, .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .topbar {
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .title-wrap h1 {
      margin: 0;
      font-size: clamp(1.6rem, 2vw, 2.3rem);
    }
    .title-wrap p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    select, input[type="number"], input[type="text"] {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 44px;
    }
    button {
      border: 0;
      border-radius: 14px;
      min-height: 44px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .tab.active {
      background: color-mix(in srgb, var(--primary) 14%, var(--surface) 86%);
      border-color: color-mix(in srgb, var(--primary) 45%, var(--border) 55%);
      color: var(--text);
    }
    .grid {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 20px;
    }
    .card {
      border-radius: var(--radius);
      padding: 20px;
    }
    .card h2, .card h3 {
      margin: 0 0 12px;
    }
    .card p.sub {
      margin: 0 0 18px;
      color: var(--muted);
    }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .inline {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .range-wrap {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 12px;
      align-items: center;
    }
    input[type="range"] { width: 100%; }
    .switches {
      display: grid;
      gap: 10px;
    }
    .switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--surface) 70%, var(--surface-2) 30%);
    }
    .switch input { width: 18px; height: 18px; }
    .result-box {
      border-radius: var(--radius);
      padding: 20px;
      display: grid;
      gap: 16px;
    }
    .output {
      width: 100%;
      min-height: 126px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--surface-2);
      color: var(--text);
      padding: 16px;
      font-size: 1.05rem;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .meter {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .meter > span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--danger);
      transition: width .2s ease, background .2s ease;
    }
    .meta, .help, .footer-note {
      color: var(--muted);
    }
    .help {
      font-size: .95rem;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-note {
      margin-top: 20px;
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      max-width: 320px;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      z-index: 30;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .hidden { display: none; }
    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .range-wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-wrap">
        <h1 id="appTitle">Secure Password Generator</h1>
        <p id="appSubtitle">Tutto viene generato localmente nel browser.</p>
      </div>
      <div class="controls">
        <select id="languageSelect" aria-label="Language selector">
          <option value="it">Italiano</option>
          <option value="en">English</option>
        </select>
        <button id="themeToggle" class="btn-secondary" type="button">🌙</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-mode="password" type="button"></button>
      <button class="tab" data-mode="pin" type="button"></button>
      <button class="tab" data-mode="passphrase" type="button"></button>
    </div>

    <main class="grid">
      <section class="card">
        <h2 id="settingsTitle"></h2>
        <p class="sub" id="settingsSubtitle"></p>

        <div id="passwordPanel">
          <div class="field">
            <label id="passwordLengthLabel" for="passwordLengthRange"></label>
            <div class="range-wrap">
              <input id="passwordLengthRange" type="range" min="8" max="128" value="20" />
              <input id="passwordLengthNumber" type="number" min="8" max="128" value="20" />
            </div>
          </div>
          <div class="switches">
            <label class="switch"><span id="lowercaseLabel"></span><input id="includeLowercase" type="checkbox" checked /></label>
            <label class="switch"><span id="uppercaseLabel"></span><input id="includeUppercase" type="checkbox" checked /></label>
            <label class="switch"><span id="numbersLabel"></span><input id="includeNumbers" type="checkbox" checked /></label>
            <label class="switch"><span id="symbolsLabel"></span><input id="includeSymbols" type="checkbox" checked /></label>
            <label class="switch"><span id="similarLabel"></span><input id="excludeSimilar" type="checkbox" checked /></label>
            <label class="switch"><span id="ambiguousLabel"></span><input id="excludeAmbiguous" type="checkbox" checked /></label>
            <label class="switch"><span id="readableLabel"></span><input id="easyRead" type="checkbox" /></label>
          </div>
        </div>

        <div id="pinPanel" class="hidden">
          <div class="field">
            <label id="pinLengthLabel" for="pinLengthRange"></label>
            <div class="range-wrap">
              <input id="pinLengthRange" type="range" min="4" max="20" value="6" />
              <input id="pinLengthNumber" type="number" min="4" max="20" value="6" />
            </div>
          </div>
          <div class="switches">
            <label class="switch"><span id="pinAvoidSimpleLabel"></span><input id="avoidSimplePin" type="checkbox" checked /></label>
          </div>
        </div>

        <div id="passphrasePanel" class="hidden">
          <div class="field">
            <label id="phraseLanguageLabel" for="phraseLanguageSelect"></label>
            <select id="phraseLanguageSelect">
              <option value="it">Italiano</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="field">
            <label id="phraseWordsLabel" for="phraseWordsRange"></label>
            <div class="range-wrap">
              <input id="phraseWordsRange" type="range" min="4" max="10" value="5" />
              <input id="phraseWordsNumber" type="number" min="4" max="10" value="5" />
            </div>
          </div>
          <div class="switches">
            <label class="switch"><span id="capitalizeLabel"></span><input id="capitalizePhrase" type="checkbox" checked /></label>
            <label class="switch"><span id="addNumberLabel"></span><input id="addNumberToPhrase" type="checkbox" /></label>
            <label class="switch"><span id="addSymbolLabel"></span><input id="addSymbolToPhrase" type="checkbox" /></label>
          </div>
          <div class="field">
            <label id="separatorLabel" for="separatorSelect"></label>
            <select id="separatorSelect">
              <option value="space">Space</option>
              <option value="-">-</option>
              <option value="_">_</option>
            </select>
          </div>
          <p class="help" id="phraseHelp"></p>
        </div>
      </section>

      <aside class="result-box">
        <div>
          <h3 id="resultTitle"></h3>
          <p class="meta" id="resultSubtitle"></p>
        </div>
        <div id="output" class="output"></div>
        <div>
          <div class="inline" style="justify-content: space-between; margin-bottom: 8px;">
            <strong id="strengthLabel"></strong>
            <span id="strengthText" class="meta"></span>
          </div>
          <div class="meter"><span id="meterBar"></span></div>
        </div>
        <div class="actions">
          <button id="generateBtn" class="btn-primary" type="button"></button>
          <button id="copyBtn" class="btn-secondary" type="button"></button>
          <button id="shareBtn" class="btn-secondary" type="button"></button>
          <button id="downloadBtn" class="btn-secondary" type="button"></button>
        </div>
        <p class="help" id="shareHelp"></p>
      </aside>
    </main>

    <footer class="footer-note" id="footerPrivacy"></footer>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const translations = {
      it: {
        tabs: { password: 'Password complessa', pin: 'PIN numerico', passphrase: 'Passphrase' },
        subtitle: 'Tutto viene generato localmente nel browser.',
        settingsTitle: 'Impostazioni',
        settingsSubtitle: 'Configura i parametri e genera un valore sicuro e pratico da usare.',
        passwordLength: 'Lunghezza password',
        lowercase: 'Includi lettere minuscole',
        uppercase: 'Includi lettere maiuscole',
        numbers: 'Includi numeri',
        symbols: 'Includi simboli',
        similar: 'Escludi caratteri simili (O, 0, I, l, 1)',
        ambiguous: 'Escludi caratteri ambigui o problematici',
        readable: 'Facile da leggere',
        pinLength: 'Lunghezza PIN',
        pinAvoidSimple: 'Evita sequenze troppo banali',
        phraseLanguage: 'Lingua passphrase',
        phraseWords: 'Numero di parole',
        capitalize: 'Iniziale maiuscola',
        addNumber: 'Aggiungi numero finale',
        addSymbol: 'Aggiungi simbolo finale',
        separator: 'Separatore',
        phraseHelp: 'La passphrase viene costruita come frase plausibile in italiano o inglese, non come semplice lista casuale di parole.',
        resultTitle: 'Risultato generato',
        resultSubtitle: 'Copia, condividi oppure esporta in un file di testo.',
        strength: 'Robustezza',
        levels: ['Debole', 'Media', 'Forte', 'Molto forte'],
        generate: 'Rigenera',
        copy: 'Copia',
        share: 'Condividi con Apple Notes',
        download: 'Esporta in file testo',
        shareHelp: 'L’esportazione verso Apple Notes dipende dal supporto del browser e del sistema operativo al pannello di condivisione.',
        footer: 'Privacy: tutto viene generato localmente nel browser, senza invio a server esterni.',
        copied: 'Copiato negli appunti.',
        downloaded: 'File di testo esportato.',
        shared: 'Condivisione avviata.',
        shareUnavailable: 'Condivisione nativa non disponibile in questo browser. Usa il file di testo.',
        invalidPasswordConfig: 'Seleziona almeno un set di caratteri per la password.',
        invalidOutput: 'Genera prima un valore.',
        pinNote: 'Un PIN corto è meno robusto di una password lunga.',
        passwordNote: 'Password casuale generata con casualità crittograficamente forte.',
        passphraseNote: 'Passphrase pensata per essere più memorizzabile ma comunque robusta.',
        separators: { space: 'Spazio', '-': 'Trattino', '_': 'Underscore' },
        outputPlaceholder: 'Premi “Rigenera” per creare un valore sicuro.'
      },
      en: {
        tabs: { password: 'Complex password', pin: 'Numeric PIN', passphrase: 'Passphrase' },
        subtitle: 'Everything is generated locally in your browser.',
        settingsTitle: 'Settings',
        settingsSubtitle: 'Configure the options and generate a secure, practical value.',
        passwordLength: 'Password length',
        lowercase: 'Include lowercase letters',
        uppercase: 'Include uppercase letters',
        numbers: 'Include numbers',
        symbols: 'Include symbols',
        similar: 'Exclude similar characters (O, 0, I, l, 1)',
        ambiguous: 'Exclude ambiguous or problematic characters',
        readable: 'Easy to read',
        pinLength: 'PIN length',
        pinAvoidSimple: 'Avoid trivial sequences',
        phraseLanguage: 'Passphrase language',
        phraseWords: 'Number of words',
        capitalize: 'Capitalize first word',
        addNumber: 'Add final number',
        addSymbol: 'Add final symbol',
        separator: 'Separator',
        phraseHelp: 'The passphrase is built as a plausible sentence in Italian or English, not as a random word list.',
        resultTitle: 'Generated result',
        resultSubtitle: 'Copy, share, or export as a text file.',
        strength: 'Strength',
        levels: ['Weak', 'Fair', 'Strong', 'Very strong'],
        generate: 'Regenerate',
        copy: 'Copy',
        share: 'Share to Apple Notes',
        download: 'Export to text file',
        shareHelp: 'Export to Apple Notes depends on browser and operating system support for the native share sheet.',
        footer: 'Privacy: everything is generated locally in your browser, with no data sent to external servers.',
        copied: 'Copied to clipboard.',
        downloaded: 'Text file exported.',
        shared: 'Share flow started.',
        shareUnavailable: 'Native sharing is not available in this browser. Use the text file export instead.',
        invalidPasswordConfig: 'Select at least one character set for the password.',
        invalidOutput: 'Generate a value first.',
        pinNote: 'A short PIN is weaker than a long password.',
        passwordNote: 'Random password generated with cryptographically strong randomness.',
        passphraseNote: 'Passphrase designed to be easier to remember while remaining robust.',
        separators: { space: 'Space', '-': 'Hyphen', '_': 'Underscore' },
        outputPlaceholder: 'Press “Regenerate” to create a secure value.'
      }
    };

    const state = {
      mode: 'password',
      lang: 'it',
      theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
      output: ''
    };

    const els = {
      html: document.documentElement,
      languageSelect: document.getElementById('languageSelect'),
      phraseLanguageSelect: document.getElementById('phraseLanguageSelect'),
      themeToggle: document.getElementById('themeToggle'),
      tabs: [...document.querySelectorAll('.tab')],
      passwordPanel: document.getElementById('passwordPanel'),
      pinPanel: document.getElementById('pinPanel'),
      passphrasePanel: document.getElementById('passphrasePanel'),
      output: document.getElementById('output'),
      meterBar: document.getElementById('meterBar'),
      strengthText: document.getElementById('strengthText'),
      toast: document.getElementById('toast')
    };

    const passwordLengthRange = document.getElementById('passwordLengthRange');
    const passwordLengthNumber = document.getElementById('passwordLengthNumber');
    const pinLengthRange = document.getElementById('pinLengthRange');
    const pinLengthNumber = document.getElementById('pinLengthNumber');
    const phraseWordsRange = document.getElementById('phraseWordsRange');
    const phraseWordsNumber = document.getElementById('phraseWordsNumber');

    function syncPair(a, b) {
      a.addEventListener('input', () => b.value = a.value);
      b.addEventListener('input', () => a.value = b.value);
    }
    syncPair(passwordLengthRange, passwordLengthNumber);
    syncPair(pinLengthRange, pinLengthNumber);
    syncPair(phraseWordsRange, phraseWordsNumber);

    function setTheme(theme) {
      state.theme = theme;
      els.html.setAttribute('data-theme', theme);
      els.themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove('show'), 2200);
    }

    function t(path) {
      return path.split('.').reduce((acc, key) => acc[key], translations[state.lang]);
    }

    function randomInt(max) {
      const array = new Uint32Array(1);
      crypto.getRandomValues(array);
      return array[0] % max;
    }

    function choice(arr) {
      return arr[randomInt(arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function generatePassword() {
      const includeLowercase = document.getElementById('includeLowercase').checked;
      const includeUppercase = document.getElementById('includeUppercase').checked;
      const includeNumbers = document.getElementById('includeNumbers').checked;
      const includeSymbols = document.getElementById('includeSymbols').checked;
      const excludeSimilar = document.getElementById('excludeSimilar').checked;
      const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
      const easyRead = document.getElementById('easyRead').checked;
      const length = Math.max(8, Math.min(128, Number(passwordLengthNumber.value || 20)));

      const sets = [];
      let lower = 'abcdefghijklmnopqrstuvwxyz';
      let upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      let nums = '0123456789';
      let syms = '!@#$%^&*()_+-={}[]:;,.?/|~';

      if (excludeSimilar || easyRead) {
        lower = lower.replace(/[ilo]/g, '');
        upper = upper.replace(/[IO]/g, '');
        nums = nums.replace(/[01]/g, '');
      }
      if (excludeAmbiguous || easyRead) {
        syms = syms.replace(/[\[\]{}()|;:,.`'"\\/]/g, '');
      }

      if (includeLowercase) sets.push(lower);
      if (includeUppercase) sets.push(upper);
      if (includeNumbers) sets.push(nums);
      if (includeSymbols) sets.push(syms);
      if (!sets.length) throw new Error(t('invalidPasswordConfig'));

      const allChars = sets.join('');
      const password = [];
      sets.forEach(set => password.push(set[randomInt(set.length)]));
      while (password.length < length) {
        password.push(allChars[randomInt(allChars.length)]);
      }
      return shuffle(password).join('');
    }

    function isSimpleSequence(pin) {
      if (/^(\d)\1+$/.test(pin)) return true;
      let asc = true, desc = true;
      for (let i = 1; i < pin.length; i++) {
        if (Number(pin[i]) !== (Number(pin[i - 1]) + 1) % 10) asc = false;
        if (Number(pin[i]) !== (Number(pin[i - 1]) + 9) % 10) desc = false;
      }
      return asc || desc;
    }

    function generatePin() {
      const length = Math.max(4, Math.min(20, Number(pinLengthNumber.value || 6)));
      const avoidSimple = document.getElementById('avoidSimplePin').checked;
      let pin = '';
      do {
        pin = Array.from({ length }, () => String(randomInt(10))).join('');
      } while (avoidSimple && isSimpleSequence(pin));
      return pin;
    }

    const phraseData = {
      it: {
        articles: ['il', 'lo', 'la', 'un', 'una'],
        adjectives: ['calmo', 'rapido', 'gentile', 'sicuro', 'lucido', 'verde', 'silenzioso', 'felice'],
        nouns: ['gatto', 'vento', 'cuoco', 'fiume', 'viaggiatore', 'giardino', 'programmatore', 'falco'],
        verbs: ['cerca', 'abbraccia', 'osserva', 'protegge', 'illumina', 'attraversa', 'raggiunge', 'ascolta'],
        objects: ['la strada', 'il porto', 'la luce', 'il mattino', 'la collina', 'il sentiero', 'la stanza', 'il mare'],
        adverbs: ['piano', 'bene', 'davvero', 'sempre', 'serenamente', 'subito']
      },
      en: {
        articles: ['the', 'a'],
        adjectives: ['quiet', 'bright', 'clever', 'steady', 'gentle', 'brave', 'silent', 'lucky'],
        nouns: ['fox', 'river', 'captain', 'garden', 'developer', 'falcon', 'traveler', 'lantern'],
        verbs: ['finds', 'guards', 'crosses', 'follows', 'greets', 'reaches', 'holds', 'watches'],
        objects: ['the path', 'the harbor', 'the morning', 'the valley', 'the shoreline', 'the bridge', 'the window', 'the forest'],
        adverbs: ['calmly', 'softly', 'boldly', 'brightly', 'today', 'nearby']
      }
    };

    function applySeparator(words, separator) {
      if (separator === 'space') return words.join(' ');
      return words.join(separator);
    }

    function capitalizeFirst(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function generatePassphrase() {
      const lang = document.getElementById('phraseLanguageSelect').value;
      const cfg = phraseData[lang];
      const wordTarget = Math.max(4, Math.min(10, Number(phraseWordsNumber.value || 5)));
      const capitalize = document.getElementById('capitalizePhrase').checked;
      const addNumber = document.getElementById('addNumberToPhrase').checked;
      const addSymbol = document.getElementById('addSymbolToPhrase').checked;
      const separator = document.getElementById('separatorSelect').value;

      let words;
      if (lang === 'it') {
        const templates = [
          () => [choice(cfg.articles), choice(cfg.adjectives), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.objects)],
          () => [choice(cfg.articles), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.objects), choice(cfg.adverbs)],
          () => [choice(cfg.articles), choice(cfg.adjectives), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.adverbs)]
        ];
        words = choice(templates)();
      } else {
        const templates = [
          () => [choice(cfg.articles), choice(cfg.adjectives), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.objects)],
          () => [choice(cfg.articles), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.objects), choice(cfg.adverbs)],
          () => [choice(cfg.articles), choice(cfg.adjectives), choice(cfg.nouns), choice(cfg.verbs), choice(cfg.adverbs)]
        ];
        words = choice(templates)();
      }

      while (words.length < wordTarget) words.push(choice(cfg.adverbs));
      if (words.length > wordTarget) words = words.slice(0, wordTarget);

      let phrase = applySeparator(words, separator);
      if (capitalize) phrase = capitalizeFirst(phrase);
      if (addNumber) phrase += (separator === 'space' ? ' ' : separator) + String(10 + randomInt(90));
      if (addSymbol) phrase += choice(['!', '@', '#', '$', '%']);
      return phrase;
    }

    function estimateStrength(value, mode) {
      let score = 0;
      if (!value) return { score: 0, width: '0%', color: 'var(--danger)', label: t('levels.0') };

      if (mode === 'password') {
        score += Math.min(40, value.length * 2);
        if (/[a-z]/.test(value)) score += 12;
        if (/[A-Z]/.test(value)) score += 12;
        if (/\d/.test(value)) score += 12;
        if (/[^A-Za-z0-9]/.test(value)) score += 16;
      } else if (mode === 'pin') {
        score += Math.min(55, value.length * 4);
        if (!isSimpleSequence(value)) score += 20;
      } else {
        const words = value.split(/[\s_-]+/).filter(Boolean).length;
        score += Math.min(50, words * 10);
        if (/\d/.test(value)) score += 10;
        if (/[^\w\s]/.test(value)) score += 10;
        if (value.length > 28) score += 15;
      }

      score = Math.min(100, score);
      let levelIndex = 0;
      let color = 'var(--danger)';
      if (score >= 80) { levelIndex = 3; color = 'var(--success)'; }
      else if (score >= 60) { levelIndex = 2; color = 'var(--primary)'; }
      else if (score >= 35) { levelIndex = 1; color = 'var(--warning)'; }
      return { score, width: score + '%', color, label: translations[state.lang].levels[levelIndex] };
    }

    function exportText() {
      if (!state.output) return showToast(t('invalidOutput'));
      const typeMap = {
        password: translations[state.lang].tabs.password,
        pin: translations[state.lang].tabs.pin,
        passphrase: translations[state.lang].tabs.passphrase
      };
      const content = [
        'Secure Password Generator',
        '--------------------------',
        'Type: ' + typeMap[state.mode],
        'Value: ' + state.output,
        'Language: ' + state.lang,
        'Generated: ' + new Date().toLocaleString(),
      ].join('\n');
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'secure-generator-' + state.mode + '.txt';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast(t('downloaded'));
    }

    async function shareOutput() {
      if (!state.output) return showToast(t('invalidOutput'));
      const shareText = 'Secure Password Generator\n' + state.output;
      if (navigator.share) {
        try {
          await navigator.share({ title: 'Secure Password Generator', text: shareText });
          showToast(t('shared'));
        } catch (e) {}
      } else {
        showToast(t('shareUnavailable'));
      }
    }

    function generateCurrent() {
      try {
        let output = '';
        if (state.mode === 'password') output = generatePassword();
        if (state.mode === 'pin') output = generatePin();
        if (state.mode === 'passphrase') output = generatePassphrase();
        state.output = output;
        els.output.textContent = output;
        updateStrength();
      } catch (err) {
        showToast(err.message);
      }
    }

    function updateStrength() {
      const result = estimateStrength(state.output, state.mode);
      els.meterBar.style.width = result.width;
      els.meterBar.style.background = result.color;
      els.strengthText.textContent = result.label;
    }

    function setMode(mode) {
      state.mode = mode;
      els.tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.mode === mode));
      els.passwordPanel.classList.toggle('hidden', mode !== 'password');
      els.pinPanel.classList.toggle('hidden', mode !== 'pin');
      els.passphrasePanel.classList.toggle('hidden', mode !== 'passphrase');
      applyTranslations();
      state.output = '';
      els.output.textContent = t('outputPlaceholder');
      updateStrength();
    }

    function applyTranslations() {
      const tr = translations[state.lang];
      document.documentElement.lang = state.lang;
      document.getElementById('appSubtitle').textContent = tr.subtitle;
      document.getElementById('settingsTitle').textContent = tr.settingsTitle;
      document.getElementById('settingsSubtitle').textContent = tr.settingsSubtitle;
      document.getElementById('passwordLengthLabel').textContent = tr.passwordLength;
      document.getElementById('lowercaseLabel').textContent = tr.lowercase;
      document.getElementById('uppercaseLabel').textContent = tr.uppercase;
      document.getElementById('numbersLabel').textContent = tr.numbers;
      document.getElementById('symbolsLabel').textContent = tr.symbols;
      document.getElementById('similarLabel').textContent = tr.similar;
      document.getElementById('ambiguousLabel').textContent = tr.ambiguous;
      document.getElementById('readableLabel').textContent = tr.readable;
      document.getElementById('pinLengthLabel').textContent = tr.pinLength;
      document.getElementById('pinAvoidSimpleLabel').textContent = tr.pinAvoidSimple;
      document.getElementById('phraseLanguageLabel').textContent = tr.phraseLanguage;
      document.getElementById('phraseWordsLabel').textContent = tr.phraseWords;
      document.getElementById('capitalizeLabel').textContent = tr.capitalize;
      document.getElementById('addNumberLabel').textContent = tr.addNumber;
      document.getElementById('addSymbolLabel').textContent = tr.addSymbol;
      document.getElementById('separatorLabel').textContent = tr.separator;
      document.getElementById('phraseHelp').textContent = tr.phraseHelp;
      document.getElementById('resultTitle').textContent = tr.resultTitle;
      document.getElementById('resultSubtitle').textContent = tr.resultSubtitle;
      document.getElementById('strengthLabel').textContent = tr.strength;
      document.getElementById('generateBtn').textContent = tr.generate;
      document.getElementById('copyBtn').textContent = tr.copy;
      document.getElementById('shareBtn').textContent = tr.share;
      document.getElementById('downloadBtn').textContent = tr.download;
      document.getElementById('shareHelp').textContent = tr.shareHelp;
      document.getElementById('footerPrivacy').textContent = tr.footer;
      document.querySelector('[data-mode="password"]').textContent = tr.tabs.password;
      document.querySelector('[data-mode="pin"]').textContent = tr.tabs.pin;
      document.querySelector('[data-mode="passphrase"]').textContent = tr.tabs.passphrase;
      const sepSelect = document.getElementById('separatorSelect');
      [...sepSelect.options].forEach(opt => opt.textContent = tr.separators[opt.value]);
      if (!state.output) els.output.textContent = tr.outputPlaceholder;
      updateStrength();
    }

    document.getElementById('generateBtn').addEventListener('click', generateCurrent);
    document.getElementById('copyBtn').addEventListener('click', async () => {
      if (!state.output) return showToast(t('invalidOutput'));
      await navigator.clipboard.writeText(state.output);
      showToast(t('copied'));
    });
    document.getElementById('downloadBtn').addEventListener('click', exportText);
    document.getElementById('shareBtn').addEventListener('click', shareOutput);
    els.languageSelect.addEventListener('change', e => {
      state.lang = e.target.value;
      document.getElementById('phraseLanguageSelect').value = state.lang;
      applyTranslations();
    });
    els.phraseLanguageSelect.addEventListener('change', () => {
      if (state.mode === 'passphrase') state.output = '';
    });
    els.themeToggle.addEventListener('click', () => setTheme(state.theme === 'dark' ? 'light' : 'dark'));
    els.tabs.forEach(tab => tab.addEventListener('click', () => setMode(tab.dataset.mode)));

    setTheme(state.theme);
    els.languageSelect.value = state.lang;
    document.getElementById('phraseLanguageSelect').value = state.lang;
    applyTranslations();
    setMode('password');
  </script>
</body>
</html>
