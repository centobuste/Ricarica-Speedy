<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --accent: #2dd4bf;
  --accent-dim: #14b8a4;
  --accent-glow: rgba(45, 212, 191, 0.15);
  --accent-ring: rgba(45, 212, 191, 0.35);

  /* Dark theme (default) */
  --bg: #0f1117;
  --surface: #181c26;
  --surface-2: #1e2333;
  --surface-3: #252b3b;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);
  --text-primary: #f0f2f8;
  --text-secondary: #8b93a8;
  --text-muted: #515b72;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --ring-track: rgba(255,255,255,0.07);
  --input-bg: #1e2333;
  --modal-overlay: rgba(0,0,0,0.65);
}

[data-theme="light"] {
  --bg: #f4f5f8;
  --surface: #ffffff;
  --surface-2: #f0f2f8;
  --surface-3: #e8ebf2;
  --border: rgba(0,0,0,0.07);
  --border-strong: rgba(0,0,0,0.13);
  --text-primary: #141828;
  --text-secondary: #5a6380;
  --text-muted: #9ba3b8;
  --shadow: 0 4px 24px rgba(0,0,0,0.1);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --ring-track: rgba(0,0,0,0.07);
  --input-bg: #f0f2f8;
  --modal-overlay: rgba(0,0,0,0.4);
  --accent-glow: rgba(45, 212, 191, 0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 15px; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background 0.25s, color 0.25s;
  -webkit-font-smoothing: antialiased;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
  background: none;
}

input {
  font-family: inherit;
  outline: none;
}

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* ============================================================
   HEADER
   ============================================================ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-weight: 600;
  font-size: 1.05rem;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.logo-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-secondary);
  transition: background 0.15s, color 0.15s;
}

.icon-btn:hover {
  background: var(--surface-2);
  color: var(--text-primary);
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.app-layout {
  display: grid;
  grid-template-columns: 280px 1fr 220px;
  gap: 0;
  flex: 1;
  max-width: 1100px;
  margin: 0 auto;
  width: 100%;
  padding: 1.5rem;
  gap: 1.25rem;
  align-items: start;
}

/* ============================================================
   TASK PANEL (left)
   ============================================================ */
.task-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1rem 0.75rem;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

.task-add-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.task-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  font-size: 0.85rem;
  color: var(--text-primary);
  transition: border-color 0.15s;
}

.task-input:focus {
  border-color: var(--accent);
}

.task-input::placeholder { color: var(--text-muted); }

.btn-add-task {
  background: var(--accent);
  color: #0f1117;
  border-radius: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  font-weight: 600;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}

.btn-add-task:hover { background: var(--accent-dim); transform: scale(1.05); }
.btn-add-task:active { transform: scale(0.97); }

.task-list {
  list-style: none;
  max-height: calc(100vh - 280px);
  overflow-y: auto;
  padding: 0.25rem 0;
}

.task-list::-webkit-scrollbar { width: 4px; }
.task-list::-webkit-scrollbar-track { background: transparent; }
.task-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

.task-item {
  display: flex;
  align-items: center;
  padding: 0.55rem 0.75rem;
  gap: 0.6rem;
  cursor: pointer;
  transition: background 0.12s;
  border-left: 3px solid transparent;
  position: relative;
}

.task-item:hover { background: var(--surface-2); }

.task-item.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.task-item.completed {
  opacity: 0.45;
}

.task-item.completed .task-name {
  text-decoration: line-through;
  color: var(--text-muted);
}

.task-check {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}

.task-item.completed .task-check {
  background: var(--accent);
  border-color: var(--accent);
}

.task-item.completed .task-check::after {
  content: '';
  width: 8px; height: 5px;
  border-left: 1.5px solid #0f1117;
  border-bottom: 1.5px solid #0f1117;
  transform: rotate(-45deg) translateY(-1px);
  display: block;
}

.task-info {
  flex: 1;
  min-width: 0;
}

.task-name {
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
  line-height: 1.3;
}

.task-sessions {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-top: 1px;
}

.task-actions {
  display: flex;
  gap: 0.2rem;
  opacity: 0;
  transition: opacity 0.15s;
  flex-shrink: 0;
}

.task-item:hover .task-actions { opacity: 1; }

.task-action-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 0.7rem;
  transition: background 0.12s, color 0.12s;
}

.task-action-btn:hover {
  background: var(--surface-3);
  color: var(--text-primary);
}

.task-action-btn.delete:hover {
  background: rgba(248,113,113,0.12);
  color: #f87171;
}

.task-empty {
  padding: 2rem 1rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
  line-height: 1.5;
}

/* ============================================================
   TIMER PANEL (center)
   ============================================================ */
.timer-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.25rem;
}

/* Mode tabs */
.mode-tabs {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  padding: 4px;
  width: 100%;
  gap: 3px;
  box-shadow: var(--shadow-sm);
}

.mode-tab {
  flex: 1;
  padding: 0.5rem 0.5rem;
  border-radius: 7px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s;
  text-align: center;
  white-space: nowrap;
}

.mode-tab:hover { color: var(--text-primary); }

.mode-tab.active {
  background: var(--surface-3);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

/* Active task indicator */
.active-task-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  width: 100%;
  box-shadow: var(--shadow-sm);
  min-height: 44px;
  transition: border-color 0.2s;
}

.active-task-bar.has-task {
  border-color: var(--accent-ring);
}

.active-task-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
  transition: background 0.2s;
}

.active-task-bar.has-task .active-task-dot {
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.active-task-label {
  font-size: 0.82rem;
  color: var(--text-muted);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.active-task-bar.has-task .active-task-label {
  color: var(--text-primary);
  font-weight: 500;
}

/* Timer ring */
.timer-container {
  position: relative;
  width: 240px; height: 240px;
  display: flex; align-items: center; justify-content: center;
}

.timer-svg {
  position: absolute;
  top: 0; left: 0;
  transform: rotate(-90deg);
  width: 100%; height: 100%;
}

.ring-track {
  fill: none;
  stroke: var(--ring-track);
  stroke-width: 5;
}

.ring-progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.95s linear, stroke 0.3s;
  filter: drop-shadow(0 0 6px var(--accent-ring));
}

.timer-display {
  position: relative;
  z-index: 2;
  text-align: center;
}

.timer-time {
  font-family: 'DM Mono', monospace;
  font-size: 3.5rem;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  line-height: 1;
}

.timer-mode-label {
  font-size: 0.75rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-muted);
  margin-top: 0.35rem;
}

/* Timer controls */
.timer-controls {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.btn-secondary {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
  font-size: 0.75rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
  box-shadow: var(--shadow-sm);
}

.btn-secondary:hover {
  background: var(--surface-2);
  color: var(--text-primary);
}

.btn-primary {
  padding: 0 2rem;
  height: 48px;
  border-radius: 12px;
  background: var(--accent);
  color: #0f1117;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 0 0 0 var(--accent-ring);
  min-width: 120px;
}

.btn-primary:hover {
  background: var(--accent-dim);
  box-shadow: 0 4px 20px var(--accent-ring);
}

.btn-primary:active { transform: scale(0.97); }

.btn-primary.running {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  color: var(--text-primary);
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   RIGHT PANEL
   ============================================================ */
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

/* Preset chips */
.presets-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
  box-shadow: var(--shadow-sm);
}

.card-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

.preset-chips {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.preset-chip {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.12s;
  text-align: left;
}

.preset-chip:hover {
  background: var(--surface-3);
  border-color: var(--border-strong);
}

.preset-chip.active {
  background: var(--accent-glow);
  border-color: var(--accent-ring);
}

.preset-chip-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
}

.preset-chip-times {
  font-size: 0.72rem;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
}

/* Custom preset expanded panel */
.custom-preset-panel {
  background: var(--surface-2);
  border: 1px solid var(--accent-ring);
  border-radius: 10px;
  padding: 0.85rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  animation: fade-in 0.18s ease;
}

.custom-slider-row {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.custom-slider-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.custom-slider-label {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.custom-slider-value {
  font-family: 'DM Mono', monospace;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--accent);
}

/* Styled range input */
.custom-range {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: linear-gradient(
    to right,
    var(--accent) 0%,
    var(--accent) var(--pct, 20%),
    var(--surface-3) var(--pct, 20%),
    var(--surface-3) 100%
  );
  outline: none;
  cursor: pointer;
  transition: background 0.05s;
}

.custom-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 1px 4px rgba(0,0,0,0.3);
  cursor: grab;
  transition: transform 0.1s, box-shadow 0.1s;
}

.custom-range::-webkit-slider-thumb:active {
  cursor: grabbing;
  transform: scale(1.2);
  box-shadow: 0 0 0 5px var(--accent-glow);
}

.custom-range::-moz-range-thumb {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  box-shadow: 0 0 0 3px var(--accent-glow);
  cursor: grab;
}

.custom-range:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 3px;
  border-radius: 2px;
}

.custom-apply-btn {
  width: 100%;
  padding: 0.45rem;
  border-radius: 7px;
  background: var(--accent);
  color: #0f1117;
  font-size: 0.8rem;
  font-weight: 600;
  text-align: center;
  transition: background 0.15s, transform 0.1s;
  margin-top: 0.1rem;
}

.custom-apply-btn:hover { background: var(--accent-dim); }
.custom-apply-btn:active { transform: scale(0.97); }

/* Stats card */
.stats-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
  box-shadow: var(--shadow-sm);
}

.stats-grid {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.stat-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-primary);
}

.stat-value.highlight {
  color: var(--accent);
}

/* Session dots */
.session-dots {
  display: flex;
  gap: 4px;
  margin-top: 0.5rem;
  flex-wrap: wrap;
}

.session-dot {
  width: 9px; height: 9px;
  border-radius: 2px;
  background: var(--surface-3);
  transition: background 0.2s, transform 0.2s;
}

.session-dot.done {
  background: var(--accent);
  transform: scale(1.1);
}

/* ============================================================
   COMPLETION OVERLAY
   ============================================================ */
.completion-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}

.completion-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.completion-toast {
  background: var(--surface);
  border: 1px solid var(--accent-ring);
  border-radius: 16px;
  padding: 1.5rem 2rem;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-ring);
  transform: translateY(12px) scale(0.96);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  max-width: 280px;
}

.completion-overlay.show .completion-toast {
  transform: translateY(0) scale(1);
}

.completion-icon {
  font-size: 2.2rem;
  margin-bottom: 0.5rem;
  animation: bounce-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes bounce-in {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.completion-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.25rem;
}

.completion-sub {
  font-size: 0.82rem;
  color: var(--text-secondary);
}

/* ============================================================
   SETTINGS MODAL
   ============================================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--modal-overlay);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 18px;
  padding: 1.5rem;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow);
  transform: translateY(16px) scale(0.97);
  transition: transform 0.25s cubic-bezier(0.34,1.2,0.64,1);
  max-height: 90vh;
  overflow-y: auto;
}

.modal-overlay.open .modal {
  transform: none;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.modal-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
}

.modal-close {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--surface-2);
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  transition: background 0.12s;
}

.modal-close:hover {
  background: var(--surface-3);
  color: var(--text-primary);
}

.settings-section {
  margin-bottom: 1.25rem;
}

.settings-section-title {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.7rem;
}

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.6rem;
}

.settings-label {
  font-size: 0.84rem;
  color: var(--text-secondary);
}

.number-input-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.num-btn {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border-strong);
  color: var(--text-secondary);
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s;
}

.num-btn:hover { background: var(--surface-3); color: var(--text-primary); }

.num-value {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  min-width: 2.2rem;
  text-align: center;
}

/* Toggle switch */
.toggle-switch {
  position: relative;
  width: 36px; height: 20px;
  flex-shrink: 0;
}

.toggle-switch input {
  opacity: 0;
  width: 0; height: 0;
  position: absolute;
}

.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--surface-3);
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}

.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  top: 3px; left: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}

input:checked + .toggle-slider { background: var(--accent); }
input:checked + .toggle-slider::before { transform: translateX(16px); }

.settings-divider {
  height: 1px;
  background: var(--border);
  margin: 1rem 0;
}

/* ============================================================
   TASK EDIT INLINE
   ============================================================ */
.task-edit-input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--accent-ring);
  border-radius: 5px;
  padding: 2px 6px;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-primary);
  min-width: 0;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .app-layout {
    grid-template-columns: 1fr;
    padding: 1rem;
    gap: 1rem;
  }

  .task-list { max-height: 220px; }

  .timer-container { width: 200px; height: 200px; }
  .timer-time { font-size: 2.9rem; }

  .right-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .preset-chips { gap: 0.3rem; }
}

@media (max-width: 560px) {
  .right-panel { grid-template-columns: 1fr; }
  .header { padding: 0 1rem; }
  .timer-time { font-size: 2.5rem; }
  .timer-container { width: 180px; height: 180px; }
}

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

.task-item {
  animation: fade-in 0.18s ease;
}

/* Ring break mode color */
.ring-progress.break { stroke: #818cf8; }
.ring-progress.long-break { stroke: #fb7185; }

/* Pulsing ring when running */
@keyframes ring-pulse {
  0%, 100% { filter: drop-shadow(0 0 6px var(--accent-ring)); }
  50% { filter: drop-shadow(0 0 12px var(--accent)); }
}

.ring-progress.running {
  animation: ring-pulse 2s ease-in-out infinite;
}

.ring-progress.running.break {
  animation: none;
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <div class="logo">
    <div class="logo-dot" aria-hidden="true"></div>
    FocusFlow
  </div>
  <div class="header-actions">

        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>

<!-- ============================================================
     MAIN APP LAYOUT
     ============================================================ -->
<main class="app-layout">

  <!-- LEFT: Task panel -->
  <aside class="task-panel" aria-label="Lista attività">

  <!-- CENTER: Timer -->

</main>

<!-- ============================================================
     COMPLETION OVERLAY
     ============================================================ -->
<div class="completion-overlay" id="completion-overlay" role="alertdialog" aria-modal="true" aria-labelledby="completion-title">
  <div class="completion-toast">

<!-- ============================================================

        </label>
      </div>

      <div class="settings-row">
        <label class="settings-label" for="toggle-sound">Suono notifica</label>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-sound" checked>

      </div>

<!-- Screen-reader only utility -->
<style>
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
</style>

<script>
/* ============================================================
   STATE
   ============================================================ */
const RING_CIRCUMFERENCE = 2 * Math.PI * 108; // 678.58

const state = {
  /* Timer */
  mode: 'focus',          // 'focus' | 'short' | 'long'
  running: false,
  secondsLeft: 0,
  totalSeconds: 0,
  intervalId: null,
  cycleCount: 0,           // focus sessions completed in current cycle

  /* Settings */
  settings: {
    focus: 25,
    short: 5,
    long: 15,
    cycles: 4,
    autostartBreak: false,
    autostartFocus: false,
    sound: true,
  },

  /* Presets */
  activePreset: 0,
  presets: [
    { name: '25 / 5 / 15',  focus: 25, short: 5,  long: 15 },
    { name: '50 / 10 / 20', focus: 50, short: 10, long: 20 },
    { name: '90 / 20 / 30', focus: 90, short: 20, long: 30 },
    { name: 'Custom',        focus: 25, short: 5,  long: 15, custom: true },
  ],

  /* Tasks */
  tasks: [],
  activeTaskId: null,
  nextTaskId: 1,

  /* Stats (in-memory, today) */
  stats: {
    sessions: 0,
    minutes: 0,
    tasksDone: 0,
  },
};

/* ============================================================
   DOM REFS
   ============================================================ */
const $timer    = document.getElementById('timer-display');
const $label    = document.getElementById('timer-mode-label');
const $ring     = document.getElementById('ring-progress');
const $startBtn = document.getElementById('start-btn');
const $resetBtn = document.getElementById('reset-btn');
const $skipBtn  = document.getElementById('skip-btn');
const $taskList = document.getElementById('task-list');
const $taskInput= document.getElementById('task-input');
const $addTask  = document.getElementById('add-task-btn');
const $activeBar= document.getElementById('active-task-bar');
const $activeLabel = document.getElementById('active-task-label');
const $modeTabs = document.querySelectorAll('.mode-tab');
const $presetContainer = document.getElementById('preset-chips');
const $sessionDots = document.getElementById('session-dots');
const $statSessions = document.getElementById('stat-sessions');
const $statMinutes  = document.getElementById('stat-minutes');
const $statTasksDone= document.getElementById('stat-tasks-done');
const $taskBadge    = document.getElementById('task-count-badge');
const $completionOverlay = document.getElementById('completion-overlay');
const $completionTitle   = document.getElementById('completion-title');
const $completionSub     = document.getElementById('completion-sub');
const $completionIcon    = document.getElementById('completion-icon');
const $settingsModal = document.getElementById('settings-modal');
const $settingsBtn   = document.getElementById('settings-btn');
const $modalClose    = document.getElementById('modal-close');
const $themeToggle   = document.getElementById('theme-toggle');

/* ============================================================
   TIMER LOGIC
   ============================================================ */

function getDuration(mode) {
  const s = state.settings;
  return mode === 'focus' ? s.focus * 60 : mode === 'short' ? s.short * 60 : s.long * 60;
}

function setMode(mode, autostart = false) {
  state.mode = mode;
  stopTimer();
  state.secondsLeft = getDuration(mode);
  state.totalSeconds = state.secondsLeft;
  updateTimerDisplay();
  updateRing();
  updateModeTabs();
  updateRingColor();
  if (autostart) startTimer();
}

function startTimer() {
  if (state.running) return;
  state.running = true;
  $startBtn.textContent = 'Pausa';
  $startBtn.classList.add('running');
  $ring.classList.add('running');

  state.intervalId = setInterval(() => {
    if (state.secondsLeft <= 0) {
      onSessionComplete();
      return;
    }
    state.secondsLeft--;
    updateTimerDisplay();
    updateRing();
  }, 1000);
}

function pauseTimer() {
  if (!state.running) return;
  state.running = false;
  clearInterval(state.intervalId);
  state.intervalId = null;
  $startBtn.textContent = 'Riprendi';
  $startBtn.classList.remove('running');
  $ring.classList.remove('running');
}

function stopTimer() {
  state.running = false;
  clearInterval(state.intervalId);
  state.intervalId = null;
  $startBtn.textContent = 'Avvia';
  $startBtn.classList.remove('running');
  $ring.classList.remove('running');
}

function resetTimer() {
  stopTimer();
  state.secondsLeft = getDuration(state.mode);
  state.totalSeconds = state.secondsLeft;
  updateTimerDisplay();
  updateRing();
}

function skipSession() {
  stopTimer();
  onSessionComplete(true);
}

function onSessionComplete(skipped = false) {
  stopTimer();

  const wasFocus = state.mode === 'focus';

  if (wasFocus && !skipped) {
    /* Update stats */
    state.stats.sessions++;
    state.stats.minutes += state.settings.focus;
    updateStatsUI();

    /* Update active task */
    if (state.activeTaskId !== null) {
      const task = state.tasks.find(t => t.id === state.activeTaskId);
      if (task) { task.sessions++; renderTasks(); }
    }

    /* Advance cycle */
    state.cycleCount++;
    updateSessionDots();

    /* Show completion toast */
    showCompletion('focus');
    playSound();

    /* Determine next break */
    const isLong = state.cycleCount >= state.settings.cycles;
    if (isLong) state.cycleCount = 0;
    const nextMode = isLong ? 'long' : 'short';
    setTimeout(() => {
      setMode(nextMode, state.settings.autostartBreak);
    }, 1800);

  } else if (!wasFocus && !skipped) {
    /* Break finished */
    showCompletion('break');
    playSound();
    setTimeout(() => {
      setMode('focus', state.settings.autostartFocus);
    }, 1800);
  } else {
    /* Skipped: just go next sensibly */
    if (wasFocus) {
      const isLong = state.cycleCount >= state.settings.cycles;
      setMode(isLong ? 'long' : 'short', false);
    } else {
      setMode('focus', false);
    }
  }
}

/* ============================================================
   DISPLAY UPDATES
   ============================================================ */

function updateTimerDisplay() {
  const m = Math.floor(state.secondsLeft / 60).toString().padStart(2, '0');
  const s = (state.secondsLeft % 60).toString().padStart(2, '0');
  $timer.textContent = `${m}:${s}`;
  document.title = `${m}:${s} – FocusFlow`;
}

function updateRing() {
  const ratio = state.totalSeconds > 0 ? state.secondsLeft / state.totalSeconds : 1;
  const offset = RING_CIRCUMFERENCE * (1 - ratio);
  $ring.style.strokeDashoffset = offset;
}

function updateRingColor() {
  $ring.classList.remove('break', 'long-break');
  if (state.mode === 'short') $ring.classList.add('break');
  if (state.mode === 'long') $ring.classList.add('long-break');
}

function updateModeTabs() {
  const labels = { focus: 'Focus', short: 'Pausa breve', long: 'Pausa lunga' };
  $label.textContent = labels[state.mode];
  $modeTabs.forEach(tab => {
    const active = tab.dataset.mode === state.mode;
    tab.classList.toggle('active', active);
    tab.setAttribute('aria-selected', active ? 'true' : 'false');
  });
}

function updateSessionDots() {
  $sessionDots.innerHTML = '';
  const total = state.settings.cycles;
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'session-dot' + (i < state.cycleCount ? ' done' : '');
    $sessionDots.appendChild(dot);
  }
}

function updateStatsUI() {
  $statSessions.textContent = state.stats.sessions;
  $statMinutes.textContent  = state.stats.minutes;
  $statTasksDone.textContent= state.stats.tasksDone;
}

/* ============================================================
   COMPLETION TOAST
   ============================================================ */
let completionTimeout = null;

function showCompletion(type) {
  if (type === 'focus') {
    $completionIcon.textContent = '🎯';
    $completionTitle.textContent = 'Sessione completata!';
    $completionSub.textContent = 'Ottimo lavoro. Prenditi una pausa.';
  } else {
    $completionIcon.textContent = '⚡';
    $completionTitle.textContent = 'Pausa terminata!';
    $completionSub.textContent = 'Pronto per la prossima sessione?';
  }
  $completionOverlay.classList.add('show');
  clearTimeout(completionTimeout);
  completionTimeout = setTimeout(() => {
    $completionOverlay.classList.remove('show');
  }, 2200);
}

$completionOverlay.addEventListener('click', () => {
  $completionOverlay.classList.remove('show');
});

/* ============================================================
   SOUND (Web Audio API — no external files)
   ============================================================ */
function playSound() {
  if (!state.settings.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.18;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.36);
    });
  } catch (e) { /* AudioContext may be unavailable */ }
}

/* ============================================================
   TASK MANAGEMENT
   ============================================================ */

function addTask(name) {
  name = name.trim();
  if (!name) return;
  const task = { id: state.nextTaskId++, name, sessions: 0, done: false };
  state.tasks.push(task);
  renderTasks();
  $taskInput.value = '';
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  if (state.activeTaskId === id) {
    state.activeTaskId = null;
    updateActiveTaskBar();
  }
  renderTasks();
}

function toggleDone(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  task.done = !task.done;
  if (task.done) {
    state.stats.tasksDone++;
    updateStatsUI();
    if (state.activeTaskId === id) {
      state.activeTaskId = null;
      updateActiveTaskBar();
    }
  }
  renderTasks();
}

function setActiveTask(id) {
  if (state.activeTaskId === id) {
    state.activeTaskId = null;
  } else {
    state.activeTaskId = id;
  }
  updateActiveTaskBar();
  renderTasks();
}

function startEditTask(id, nameEl) {
  const task = state.tasks.find(t => t.id === id);
  if (!task) return;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = task.name;
  input.className = 'task-edit-input';
  input.maxLength = 80;
  nameEl.replaceWith(input);
  input.focus();
  input.select();

  const commit = () => {
    const val = input.value.trim();
    if (val) task.name = val;
    renderTasks();
    if (state.activeTaskId === id) updateActiveTaskBar();
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') renderTasks();
  });
}

function renderTasks() {
  const empty = document.getElementById('task-empty');
  if (state.tasks.length === 0) {
    if (!empty) {
      $taskList.innerHTML = '<li class="task-empty" id="task-empty">Nessuna attività. Aggiungine una!</li>';
    }
    $taskBadge.textContent = '0';
    return;
  }

  $taskList.innerHTML = '';
  const active = state.tasks.filter(t => !t.done);
  const done   = state.tasks.filter(t => t.done);
  const ordered = [...active, ...done];

  ordered.forEach(task => {
    const li = document.createElement('li');
    li.className = 'task-item' +
      (task.id === state.activeTaskId ? ' active' : '') +
      (task.done ? ' completed' : '');
    li.setAttribute('role', 'listitem');
    li.dataset.id = task.id;

    li.innerHTML = `
      <button class="task-check" aria-label="${task.done ? 'Segna come incompleto' : 'Segna come completato'}"></button>
      <div class="task-info">
        <div class="task-name">${escapeHtml(task.name)}</div>
        <div class="task-sessions">${task.sessions > 0 ? `${task.sessions} sessione${task.sessions !== 1 ? 'i' : ''}` : ''}</div>
      </div>
      <div class="task-actions">
        <button class="task-action-btn edit-btn" aria-label="Modifica attività" title="Modifica">✎</button>
        <button class="task-action-btn delete delete-btn" aria-label="Elimina attività" title="Elimina">✕</button>
      </div>
    `;

    /* Click on task info area → set active */
    li.querySelector('.task-info').addEventListener('click', () => {
      if (!task.done) setActiveTask(task.id);
    });

    /* Check button */
    li.querySelector('.task-check').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(task.id);
    });

    /* Edit */
    li.querySelector('.edit-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      startEditTask(task.id, li.querySelector('.task-name'));
    });

    /* Delete */
    li.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteTask(task.id);
    });

    $taskList.appendChild(li);
  });

  $taskBadge.textContent = active.length;
}

function updateActiveTaskBar() {
  const task = state.tasks.find(t => t.id === state.activeTaskId);
  if (task) {
    $activeLabel.textContent = task.name;
    $activeBar.classList.add('has-task');
  } else {
    $activeLabel.textContent = 'Nessuna attività selezionata';
    $activeBar.classList.remove('has-task');
  }
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ============================================================
   PRESETS
   ============================================================ */

function renderPresets() {
  $presetContainer.innerHTML = '';
  state.presets.forEach((preset, i) => {
    if (preset.custom) {
      /* ---- Custom: always render as expandable slider panel ---- */
      const isActive = i === state.activePreset;

      /* Header chip (click toggles expansion / activates) */
      const chip = document.createElement('button');
      chip.className = 'preset-chip' + (isActive ? ' active' : '');
      chip.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      chip.setAttribute('aria-expanded', isActive ? 'true' : 'false');
      chip.setAttribute('aria-controls', 'custom-preset-panel');
      chip.innerHTML = `
        <span class="preset-chip-name">Custom</span>
        <span class="preset-chip-times">${preset.focus}/${preset.short}/${preset.long}</span>
      `;
      chip.addEventListener('click', () => {
        if (state.activePreset !== i) applyPreset(i);
        else {
          /* Already active: just toggle the panel open if somehow closed */
          const panel = document.getElementById('custom-preset-panel');
          if (panel) panel.style.display = panel.style.display === 'none' ? '' : '';
        }
      });
      $presetContainer.appendChild(chip);

      /* Slider panel — always rendered, visible when Custom is active */
      const panel = document.createElement('div');
      panel.className = 'custom-preset-panel';
      panel.id = 'custom-preset-panel';
      if (!isActive) panel.style.display = 'none';

      const sliders = [
        { key: 'focus', label: 'Focus',       min: 1, max: 120, val: preset.focus },
        { key: 'short', label: 'Pausa breve', min: 1, max: 60,  val: preset.short },
        { key: 'long',  label: 'Pausa lunga', min: 1, max: 90,  val: preset.long  },
      ];

      sliders.forEach(s => {
        const row = document.createElement('div');
        row.className = 'custom-slider-row';

        const pct = ((s.val - s.min) / (s.max - s.min) * 100).toFixed(1) + '%';

        row.innerHTML = `
          <div class="custom-slider-head">
            <label class="custom-slider-label" for="cslider-${s.key}">${s.label}</label>
            <span class="custom-slider-value" id="cval-${s.key}">${s.val} min</span>
          </div>
          <input
            type="range"
            id="cslider-${s.key}"
            class="custom-range"
            min="${s.min}" max="${s.max}" value="${s.val}" step="1"
            style="--pct:${pct}"
            aria-label="${s.label} minuti"
            aria-valuemin="${s.min}" aria-valuemax="${s.max}" aria-valuenow="${s.val}"
          >
        `;

        const input = row.querySelector('input');
        const valEl = row.querySelector(`#cval-${s.key}`);

        input.addEventListener('input', () => {
          const v = parseInt(input.value);
          const p = ((v - s.min) / (s.max - s.min) * 100).toFixed(1) + '%';
          input.style.setProperty('--pct', p);
          input.setAttribute('aria-valuenow', v);
          valEl.textContent = v + ' min';
          /* Live-update the custom preset object */
          state.presets[i][s.key] = v;
          /* Update the chip times label */
          chip.querySelector('.preset-chip-times').textContent =
            `${state.presets[i].focus}/${state.presets[i].short}/${state.presets[i].long}`;
        });

        panel.appendChild(row);
      });

      /* Apply button */
      const applyBtn = document.createElement('button');
      applyBtn.className = 'custom-apply-btn';
      applyBtn.textContent = 'Applica';
      applyBtn.addEventListener('click', () => {
        state.settings.focus = state.presets[i].focus;
        state.settings.short = state.presets[i].short;
        state.settings.long  = state.presets[i].long;
        stopTimer();
        state.secondsLeft = getDuration(state.mode);
        state.totalSeconds = state.secondsLeft;
        updateTimerDisplay();
        updateRing();
        updateSessionDots();
        /* Flash active style */
        chip.classList.add('active');
      });
      panel.appendChild(applyBtn);

      $presetContainer.appendChild(panel);

    } else {
      /* ---- Standard preset chip ---- */
      const btn = document.createElement('button');
      btn.className = 'preset-chip' + (i === state.activePreset ? ' active' : '');
      btn.setAttribute('aria-pressed', i === state.activePreset ? 'true' : 'false');
      btn.innerHTML = `
        <span class="preset-chip-name">${escapeHtml(preset.name)}</span>
        <span class="preset-chip-times">${preset.focus}/${preset.short}/${preset.long}</span>
      `;
      btn.addEventListener('click', () => applyPreset(i));
      $presetContainer.appendChild(btn);
    }
  });
}

function applyPreset(index) {
  state.activePreset = index;
  const p = state.presets[index];
  state.settings.focus = p.focus;
  state.settings.short = p.short;
  state.settings.long  = p.long;

  if (p.custom) {
    syncSettingsUI();
  }

  stopTimer();
  state.secondsLeft = getDuration(state.mode);
  state.totalSeconds = state.secondsLeft;
  updateTimerDisplay();
  updateRing();
  renderPresets();
  updateSessionDots();
}

/* ============================================================
   SETTINGS
   ============================================================ */

function syncSettingsUI() {
  document.getElementById('set-focus').textContent  = state.settings.focus;
  document.getElementById('set-short').textContent  = state.settings.short;
  document.getElementById('set-long').textContent   = state.settings.long;
  document.getElementById('set-cycles').textContent = state.settings.cycles;
  document.getElementById('toggle-autostart-break').checked = state.settings.autostartBreak;
  document.getElementById('toggle-autostart-focus').checked = state.settings.autostartFocus;
  document.getElementById('toggle-sound').checked           = state.settings.sound;
}

function openSettings() {
  syncSettingsUI();
  $settingsModal.classList.add('open');
  $modalClose.focus();
}

function closeSettings() {
  $settingsModal.classList.remove('open');
  $settingsBtn.focus();
}

function saveSettings() {
  state.settings.focus  = parseInt(document.getElementById('set-focus').textContent);
  state.settings.short  = parseInt(document.getElementById('set-short').textContent);
  state.settings.long   = parseInt(document.getElementById('set-long').textContent);
  state.settings.cycles = parseInt(document.getElementById('set-cycles').textContent);
  state.settings.autostartBreak = document.getElementById('toggle-autostart-break').checked;
  state.settings.autostartFocus = document.getElementById('toggle-autostart-focus').checked;
  state.settings.sound          = document.getElementById('toggle-sound').checked;

  /* Update Custom preset with current values */
  const customIndex = state.presets.findIndex(p => p.custom);
  if (customIndex >= 0) {
    state.presets[customIndex].focus = state.settings.focus;
    state.presets[customIndex].short = state.settings.short;
    state.presets[customIndex].long  = state.settings.long;
    /* Mark active preset as Custom if none of the standard presets match */
    const match = state.presets.findIndex((p, i) =>
      !p.custom &&
      p.focus === state.settings.focus &&
      p.short === state.settings.short &&
      p.long  === state.settings.long
    );
    if (match === -1) state.activePreset = customIndex;
  }

  stopTimer();
  state.secondsLeft = getDuration(state.mode);
  state.totalSeconds = state.secondsLeft;
  updateTimerDisplay();
  updateRing();
  updateSessionDots();
  renderPresets();
  closeSettings();
}

/* Num buttons +/- */
document.querySelectorAll('.num-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const field = btn.dataset.field;
    const dir   = parseInt(btn.dataset.dir);
    const el    = document.getElementById('set-' + field);
    const limits = { focus: [1, 180], short: [1, 60], long: [1, 90], cycles: [1, 10] };
    let val = parseInt(el.textContent) + dir;
    val = Math.max(limits[field][0], Math.min(limits[field][1], val));
    el.textContent = val;
  });
});

/* ============================================================
   THEME TOGGLE
   ============================================================ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  const icon = document.getElementById('theme-icon');
  if (isDark) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}

/* ============================================================
   EVENT LISTENERS
   ============================================================ */

$startBtn.addEventListener('click', () => {
  state.running ? pauseTimer() : startTimer();
});

$resetBtn.addEventListener('click', resetTimer);
$skipBtn.addEventListener('click', skipSession);

$modeTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    if (!state.running) setMode(tab.dataset.mode);
  });
});

$addTask.addEventListener('click', () => addTask($taskInput.value));
$taskInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask($taskInput.value);
});

$settingsBtn.addEventListener('click', openSettings);
$modalClose.addEventListener('click', closeSettings);
document.getElementById('save-settings').addEventListener('click', saveSettings);

$settingsModal.addEventListener('click', e => {
  if (e.target === $settingsModal) closeSettings();
});

$themeToggle.addEventListener('click', toggleTheme);

/* Keyboard: close modal on Escape */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($settingsModal.classList.contains('open')) closeSettings();
  }
});

/* ============================================================
   INIT
   ============================================================ */
function init() {
  setMode('focus');
  renderPresets();
  updateSessionDots();
  updateStatsUI();
  renderTasks();
  updateActiveTaskBar();
}

init();
</script>
</body>
</html>
